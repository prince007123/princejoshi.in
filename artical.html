<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futuristic Admin Panel</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      position: fixed;
      top: 0;
      left: 0;
      padding: 20px;
    }
    .sidebar h2 {
      margin: 0 0 30px;
      text-align: center;
      color: #00e6ff;
      text-shadow: 0 0 10px #00e6ff;
    }
    .sidebar a {
      display: block;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      font-size: 16px;
      transition: 0.3s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
    }

    /* Main Content */
    .main-content {
      margin-left: 260px;
      padding: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .card h3 {
      margin-top: 0;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 8px;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .stat-box {
      flex: 1;
      min-width: 200px;
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      transition: 0.3s;
    }
    .stat-box:hover {
      transform: scale(1.05);
    }
    .stat-box h2 {
      margin: 0;
      color: #00e6ff;
    }

    /* Button */
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      opacity: 0.8;
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>⚡ Admin</h2>
    <a href="#" class="active" onclick="showPage('dashboard')">🏠 Dashboard</a>
    <a href="#" onclick="showPage('posts')">📝 Posts</a>
    <a href="#" onclick="showPage('users')">👥 Users</a>
    <a href="#" onclick="showPage('analytics')">📊 Analytics</a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Dashboard -->
    <div id="dashboard" class="page">
      <h1>Dashboard Overview</h1>
      <div class="stats">
        <div class="stat-box"><h2 id="postCount">0</h2><p>Total Posts</p></div>
        <div class="stat-box"><h2 id="userCount">0</h2><p>Total Users</p></div>
        <div class="stat-box"><h2>1200</h2><p>Website Visits</p></div>
      </div>
    </div>

    <!-- Posts -->
    <div id="posts" class="page" style="display:none;">
      <h1>Manage Posts</h1>
      <input type="text" id="postInput" placeholder="Enter post title">
      <button onclick="addPost()">Add Post</button>
      <div class="card">
        <h3>Posts List</h3>
        <ul id="postList"></ul>
      </div>
    </div>

    <!-- Users -->
    <div id="users" class="page" style="display:none;">
      <h1>Manage Users</h1>
      <input type="text" id="userInput" placeholder="Enter user name">
      <button onclick="addUser()">Add User</button>
      <div class="card">
        <h3>User List</h3>
        <ul id="userList"></ul>
      </div>
    </div>

    <!-- Analytics -->
    <div id="analytics" class="page" style="display:none;">
      <h1>Analytics</h1>
      <div class="card">
        <p>📈 Chart Placeholder (Future)</p>
      </div>
    </div>
  </div>

  <script>
    let posts = [];
    let users = [];

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
      document.getElementById(pageId).style.display = 'block';
      document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
      event.target.classList.add('active');
    }

    function addPost() {
      let val = document.getElementById("postInput").value;
      if(val.trim() !== ""){
        posts.push(val);
        document.getElementById("postList").innerHTML = posts.map((p,i)=>`<li>${p} <button onclick="deletePost(${i})">❌</button></li>`).join("");
        document.getElementById("postInput").value = "";
        document.getElementById("postCount").innerText = posts.length;
      }
    }

    function deletePost(i){
      posts.splice(i,1);
      document.getElementById("postList").innerHTML = posts.map((p,i)=>`<li>${p} <button onclick="deletePost(${i})">❌</button></li>`).join("");
      document.getElementById("postCount").innerText = posts.length;
    }

    function addUser() {
      let val = document.getElementById("userInput").value;
      if(val.trim() !== ""){
        users.push(val);
        document.getElementById("userList").innerHTML = users.map((u,i)=>`<li>${u} <button onclick="deleteUser(${i})">❌</button></li>`).join("");
        document.getElementById("userInput").value = "";
        document.getElementById("userCount").innerText = users.length;
      }
    }

    function deleteUser(i){
      users.splice(i,1);
      document.getElementById("userList").innerHTML = users.map((u,i)=>`<li>${u} <button onclick="deleteUser(${i})">❌</button></li>`).join("");
      document.getElementById("userCount").innerText = users.length;
    }
  </script>
</body>
</html>
