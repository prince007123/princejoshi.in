<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Meme</title>
<style>
  /* ── RESET ── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Arial Black', Arial, sans-serif;
    user-select: none;
  }

  /* ── CANVAS WRAPPER ── */
  #gameWrapper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #gameCanvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }

  /* ── SCORE ── */
  #scoreHud {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,0.75);
    pointer-events: none;
    z-index: 20;
    letter-spacing: 3px;
    display: none;
  }

  /* ══════════════════════════════════════════
     OVERLAYS — shared base
  ══════════════════════════════════════════ */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 3vh, 26px);
    background: rgba(0, 0, 0, 0.82);
    padding: clamp(20px, 5vw, 40px);
    /* allow scrolling only if content overflows on tiny screens */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .overlay.hidden {
    display: none !important;
  }

  /* ══════════════════════════════════════════
     START SCREEN
  ══════════════════════════════════════════ */
  .game-title {
    font-size: clamp(2rem, 9vw, 4.5rem);
    font-weight: 900;
    color: #FFD700;
    text-align: center;
    text-shadow: 0 5px 0 #7a4800, 0 0 40px rgba(255,200,0,0.65);
    animation: titleBounce 2.6s ease-in-out infinite;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  @keyframes titleBounce {
    0%, 100% { transform: translateY(0) rotate(-1.5deg); }
    50%       { transform: translateY(-10px) rotate(1.5deg); }
  }

  .sub-text {
    font-size: clamp(0.85rem, 3vw, 1.2rem);
    color: rgba(255,255,255,0.85);
    text-align: center;
    text-shadow: 0 2px 8px #000;
    line-height: 1.7;
  }

  .hint-text {
    font-size: clamp(0.68rem, 2.2vw, 0.82rem);
    color: rgba(255,255,255,0.38);
    text-align: center;
  }

  /* ══════════════════════════════════════════
     BUTTONS — big enough to tap on mobile
  ══════════════════════════════════════════ */
  .btn {
    cursor: pointer;
    border: none;
    outline: none;
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    border-radius: 60px;
    /* generous tap target */
    min-width: clamp(200px, 60vw, 280px);
    min-height: 56px;
    font-size: clamp(1.05rem, 4.5vw, 1.5rem);
    padding: 14px 36px;
    letter-spacing: 0.5px;
    /* stops double-tap zoom on iOS */
    touch-action: manipulation;
    transition: transform 0.12s, box-shadow 0.12s;
  }

  /* Red — Start Game */
  .btn-red {
    background: linear-gradient(135deg, #FF4500, #cc2000);
    color: #fff;
    box-shadow: 0 8px 0 #7a0f00, 0 0 32px rgba(255,69,0,0.45);
  }
  .btn-red:hover  { transform: translateY(-3px); box-shadow: 0 11px 0 #7a0f00; }
  .btn-red:active { transform: translateY(5px) !important; box-shadow: 0 3px 0 #7a0f00 !important; }

  /* Gold — Play Again */
  .btn-gold {
    background: linear-gradient(135deg, #FFD700, #e0a000);
    color: #1a0a00;
    box-shadow: 0 8px 0 #8B6200, 0 0 28px rgba(255,215,0,0.35);
    /* hidden until game over */
    display: none;
    opacity: 0;
  }
  .btn-gold.show {
    display: block;
    animation: fadeUp 0.5s 0.3s ease forwards;
  }
  .btn-gold:hover  { transform: translateY(-3px); box-shadow: 0 11px 0 #8B6200; }
  .btn-gold:active { transform: translateY(5px) !important; box-shadow: 0 3px 0 #8B6200 !important; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  /* ══════════════════════════════════════════
     GAME OVER IMAGE
  ══════════════════════════════════════════ */
  #gameOverImg {
    max-width: min(85vw, 400px);
    max-height: 44vh;
    object-fit: contain;
    border-radius: 18px;
    box-shadow: 0 0 70px rgba(255,60,0,0.55), 0 10px 40px rgba(0,0,0,0.8);
    display: none;
    animation: popIn 0.42s cubic-bezier(0.175, 0.885, 0.32, 1.45) forwards;
  }

  #gameOverImg.show { display: block; }

  @keyframes popIn {
    from { transform: scale(0.35); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
</style>
</head>
<body>

<!-- SCORE -->
<div id="scoreHud">0</div>

<!-- CANVAS -->
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- ═══ START SCREEN ═══ -->
<div id="startScreen" class="overlay">
  <div class="game-title">🐦 Flappy Meme</div>
  <div class="sub-text">
    Tap &nbsp;•&nbsp; Click &nbsp;•&nbsp; Space to Flap!<br>
    Survive the pipes. Don't die. 💀
  </div>
  <button class="btn btn-red" id="btnStart">▶ &nbsp;Start Game</button>
  <div class="hint-text">Touch anywhere to flap on mobile</div>
</div>

<!-- ═══ GAME OVER ═══ -->
<div id="gameOverScreen" class="overlay hidden">
  <img id="gameOverImg" src="gameover_image.png" alt="Game Over">
  <button class="btn btn-gold" id="btnAgain">↩ &nbsp;Play Again</button>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════
//  AUDIO  — never starts automatically
// ══════════════════════════════════════════════════
const bgMusic = new Audio('bg_music.mp3');
bgMusic.loop  = true;
bgMusic.volume = 0.6;

const goSound = new Audio('gameover_sound.mp3');
goSound.loop  = false;
goSound.volume = 1.0;

/** Start bg music from the 10-second mark */
function startMusic() {
  bgMusic.currentTime = 10;
  bgMusic.play().catch(function() {});
}

/** Immediately stop bg music */
function stopMusic() {
  bgMusic.pause();
}

/** Play game-over sound once */
function playGoSound() {
  goSound.currentTime = 0;
  goSound.play().catch(function() {});
}

// ══════════════════════════════════════════════════
//  IMAGE ASSETS
// ══════════════════════════════════════════════════
var imgBird = new Image(); imgBird.src = 'bird_actor.png';
var imgPipe = new Image(); imgPipe.src = 'pipe_actor.png';
var imgBg   = new Image(); imgBg.src   = 'background.jpg';

// ══════════════════════════════════════════════════
//  DOM REFS
// ══════════════════════════════════════════════════
var startScreen    = document.getElementById('startScreen');
var gameOverScreen = document.getElementById('gameOverScreen');
var gameOverImg    = document.getElementById('gameOverImg');
var btnAgain       = document.getElementById('btnAgain');
var scoreHud       = document.getElementById('scoreHud');

// ══════════════════════════════════════════════════
//  OVERLAY HELPERS
// ══════════════════════════════════════════════════
function hideStart() {
  startScreen.classList.add('hidden');
}

function showGameOver() {
  gameOverImg.classList.add('show');
  btnAgain.classList.add('show');
  gameOverScreen.classList.remove('hidden');
}

function hideGameOver() {
  gameOverScreen.classList.add('hidden');
  gameOverImg.classList.remove('show');
  btnAgain.classList.remove('show');
}

// ══════════════════════════════════════════════════
//  START BUTTON
// ══════════════════════════════════════════════════
document.getElementById('btnStart').addEventListener('click', function(e) {
  e.preventDefault();
  hideStart();
  scoreHud.style.display = 'block';
  startMusic();          // music starts only here
  initGame();
}, { passive: false });

// ══════════════════════════════════════════════════
//  PLAY AGAIN BUTTON
//  Bind both click and touchend so it fires on every
//  mobile browser reliably.
// ══════════════════════════════════════════════════
function onPlayAgain(e) {
  e.preventDefault();
  e.stopPropagation();
  hideGameOver();
  startMusic();          // restart from 10 s
  if (window._resetGame) window._resetGame();
}

btnAgain.addEventListener('click',    onPlayAgain, { passive: false });
btnAgain.addEventListener('touchend', onPlayAgain, { passive: false });

// ══════════════════════════════════════════════════
//  GAME
// ══════════════════════════════════════════════════
function initGame() {
  var canvas = document.getElementById('gameCanvas');
  var ctx    = canvas.getContext('2d');

  var BIRD_W = 60;
  var BIRD_H = 45;

  var W, H, GROUND_H, PIPE_W, PIPE_GAP;

  function resize() {
    W        = Math.min(window.innerWidth, 480);
    H        = window.innerHeight;
    GROUND_H = Math.round(H * 0.08);
    PIPE_W   = Math.round(W * 0.16);
    PIPE_GAP = Math.round(H * 0.27);
    canvas.width        = W;
    canvas.height       = H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Game state ────────────────────────────────────
  var running   = false;
  var dead      = false;
  var score     = 0;
  var frameId   = null;
  var groundX   = 0;
  var lastPipe  = 0;
  var pipes     = [];
  var particles = [];

  // ── Bird physics — NOT changed ────────────────────
  var GRAVITY  =  0.38;
  var FLAP_V   = -7.5;
  var MAX_FALL =  9;
  var MAX_RISE = -10;
  var bird = { x: 0, y: 0, vy: 0, angle: 0 };

  function resetBird() {
    bird.x     = W * 0.22;
    bird.y     = H * 0.42;
    bird.vy    = 0;
    bird.angle = 0;
  }

  // ── Pipe constants — NOT changed ─────────────────
  var PIPE_SPEED = 2.6;
  var PIPE_INT   = 1700;

  function spawnPipe() {
    var minTop = H * 0.10;
    var maxTop = H - GROUND_H - PIPE_GAP - H * 0.10;
    pipes.push({
      x:      W + PIPE_W,
      topH:   minTop + Math.random() * (maxTop - minTop),
      passed: false
    });
  }

  // ── Particles ─────────────────────────────────────
  function spawnParticles() {
    var count = 4 + Math.floor(Math.random() * 4);
    for (var i = 0; i < count; i++) {
      var sz = BIRD_H * 0.14 + Math.random() * BIRD_H * 0.22;
      particles.push({
        x:     bird.x - BIRD_W * 0.42,
        y:     bird.y + (Math.random() - 0.5) * BIRD_H * 0.55,
        vx:    -(1.4 + Math.random() * 2.8),
        vy:    (Math.random() - 0.5) * 1.8,
        sz:    sz,
        maxSz: sz,
        life:  1.0,
        decay: 0.022 + Math.random() * 0.028,
        hue:   12 + Math.random() * 38,
        sat:   88 + Math.random() * 12
      });
    }
  }

  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;  p.y += p.vy;
      p.vx *= 0.93; p.vy *= 0.91;
      p.life -= p.decay;
      p.sz = p.maxSz * p.life;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var a = p.life * p.life;

      // Additive glow
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      var grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.sz * 2.8);
      grd.addColorStop(0, 'hsla(' + p.hue + ',' + p.sat + '%,68%,' + (a * 0.52).toFixed(3) + ')');
      grd.addColorStop(1, 'hsla(' + (p.hue + 18) + ',80%,40%,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz * 2.8, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.restore();

      // Hot core
      ctx.save();
      ctx.globalAlpha = a;
      var core = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.sz);
      core.addColorStop(0,   'hsl(60,100%,97%)');
      core.addColorStop(0.3, 'hsl(' + p.hue + ',' + p.sat + '%,72%)');
      core.addColorStop(0.7, 'hsl(' + (p.hue + 12) + ',85%,52%)');
      core.addColorStop(1,   'hsl(' + (p.hue + 25) + ',70%,34%)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
      ctx.fillStyle = core;
      ctx.fill();
      ctx.restore();
    }
  }

  // ── Draw: Background ──────────────────────────────
  function drawBackground() {
    if (imgBg.complete && imgBg.naturalWidth > 0) {
      var iw    = imgBg.naturalWidth;
      var ih    = imgBg.naturalHeight;
      var scale = Math.max(W / iw, H / ih);
      var dw    = iw * scale;
      var dh    = ih * scale;
      ctx.drawImage(imgBg, (W - dw) / 2, (H - dh) / 2, dw, dh);
    } else {
      var sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#1a1a2e');
      sky.addColorStop(1, '#16213e');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ── Draw: Ground ──────────────────────────────────
  function drawGround() {
    var gY = H - GROUND_H;
    var g  = ctx.createLinearGradient(0, gY, 0, H);
    g.addColorStop(0,    '#4a8c2a');
    g.addColorStop(0.12, '#2d5a1b');
    g.addColorStop(1,    '#0d1a08');
    ctx.fillStyle = g;
    ctx.fillRect(0, gY, W, GROUND_H);
    ctx.fillStyle = '#5aa030';
    ctx.fillRect(0, gY, W, 6);
    ctx.strokeStyle = 'rgba(255,255,255,0.09)';
    ctx.lineWidth = 1;
    var dw    = 28;
    var total = 74;
    var off   = groundX % total;
    for (var x = -total + off; x < W + total; x += total) {
      ctx.beginPath();
      ctx.moveTo(x,      gY + 18);
      ctx.lineTo(x + dw, gY + 18);
      ctx.stroke();
    }
  }

  // ── Draw: Pipes ───────────────────────────────────
  function drawPipes() {
    for (var i = 0; i < pipes.length; i++) {
      var p    = pipes[i];
      var botY = p.topH + PIPE_GAP;
      var botH = H - GROUND_H - botY;
      if (imgPipe.complete && imgPipe.naturalWidth > 0) {
        if (p.topH > 0) {
          ctx.save();
          ctx.translate(p.x, p.topH);
          ctx.scale(1, -1);
          ctx.drawImage(imgPipe, 0, 0, PIPE_W, p.topH);
          ctx.restore();
        }
        if (botH > 0) ctx.drawImage(imgPipe, p.x, botY, PIPE_W, botH);
      } else {
        ctx.fillStyle = '#2d8b2d';
        if (p.topH > 0) ctx.fillRect(p.x, 0,    PIPE_W, p.topH);
        if (botH  > 0)  ctx.fillRect(p.x, botY,  PIPE_W, botH);
      }
    }
  }

  // ── Draw: Bird ────────────────────────────────────
  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.angle);
    if (imgBird.complete && imgBird.naturalWidth > 0) {
      ctx.drawImage(imgBird, -BIRD_W / 2, -BIRD_H / 2, BIRD_W, BIRD_H);
    } else {
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.ellipse(0, 0, BIRD_W / 2, BIRD_H / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ── Flap — particles only, no sound ───────────────
  function flap() {
    if (dead) return;
    if (!running) {
      running  = true;
      lastPipe = performance.now();
    }
    bird.vy = FLAP_V;
    spawnParticles();
  }

  // ── Collision — unchanged ─────────────────────────
  function checkCollision() {
    var hw = BIRD_W * 0.38;
    var hh = BIRD_H * 0.38;
    if (bird.y + hh >= H - GROUND_H || bird.y - hh <= 0) return true;
    for (var i = 0; i < pipes.length; i++) {
      var p = pipes[i];
      if (bird.x + hw > p.x && bird.x - hw < p.x + PIPE_W) {
        if (bird.y - hh < p.topH || bird.y + hh > p.topH + PIPE_GAP) return true;
      }
    }
    return false;
  }

  // ── Game Over ─────────────────────────────────────
  function triggerDeath() {
    dead    = true;
    running = false;
    stopMusic();
    playGoSound();
    setTimeout(showGameOver, 450);
  }

  // ── Reset ─────────────────────────────────────────
  function resetGame() {
    pipes     = [];
    particles = [];
    score     = 0;
    dead      = false;
    running   = false;
    groundX   = 0;
    scoreHud.textContent = '0';
    resetBird();
    if (frameId) cancelAnimationFrame(frameId);
    loop(performance.now());
  }

  window._resetGame = resetGame;

  // ── Main Loop ─────────────────────────────────────
  function loop(ts) {
    frameId = requestAnimationFrame(loop);
    ctx.clearRect(0, 0, W, H);
    drawBackground();

    if (running && !dead) {
      groundX += PIPE_SPEED;

      bird.vy    = Math.max(MAX_RISE, Math.min(MAX_FALL, bird.vy + GRAVITY));
      bird.y    += bird.vy;
      bird.angle = Math.max(-0.42, Math.min(Math.PI / 2.4, bird.vy * 0.065));

      if (ts - lastPipe > PIPE_INT) { spawnPipe(); lastPipe = ts; }

      for (var i = 0; i < pipes.length; i++) {
        pipes[i].x -= PIPE_SPEED;
        if (!pipes[i].passed && pipes[i].x + PIPE_W < bird.x) {
          pipes[i].passed = true;
          score++;
          scoreHud.textContent = score;
        }
      }
      pipes = pipes.filter(function(p) { return p.x + PIPE_W > -10; });

      if (Math.random() < 0.45) spawnParticles();
      updateParticles();

      if (checkCollision()) triggerDeath();

    } else if (!running && !dead) {
      bird.y     = H * 0.42 + Math.sin(ts / 600) * 8;
      bird.angle = Math.sin(ts / 600) * 0.07;
    }

    drawGround();
    drawParticles();
    drawPipes();
    drawBird();
  }

  // ── Controls ──────────────────────────────────────
  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.key === ' ' || e.code === 'ArrowUp') {
      e.preventDefault();
      flap();
    }
  });

  // Canvas tap/click — only fires when start screen is gone
  canvas.addEventListener('pointerdown', function(e) {
    // Ignore taps that land on overlay buttons
    if (!startScreen.classList.contains('hidden'))    return;
    if (!gameOverScreen.classList.contains('hidden')) return;
    e.preventDefault();
    flap();
  }, { passive: false });

  // Prevent scroll during gameplay on iOS / Android
  document.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  // ── Init ──────────────────────────────────────────
  resetBird();
  loop(performance.now());
}
</script>
</body>
</html>
